name: CI

on:
  push:
    branches: [main, Tessera-head]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax & import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pure-Python dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas requests python-dotenv shapely jinja2 matplotlib

      - name: Compile all Python source files
        run: python -m compileall -q src/ GEE_dynamic/ NDVI_pred/ main_audit.py

      - name: Verify src package is importable
        # MagicMock stubs let us walk the full import graph without
        # installing GDAL, CUDA, Earth Engine, or other native deps.
        run: |
          python - <<'EOF'
          import sys
          from unittest.mock import MagicMock

          for mod in [
              "torch", "torch.nn", "torch.optim", "torch.utils", "torch.utils.data",
              "torchvision", "torchvision.models", "torchvision.models.segmentation",
              "rasterio", "rasterio.warp", "rasterio.features",
              "affine",
              "cv2", "ee", "s2cloudless", "geotessera",
              "geopandas", "osmnx", "lightgbm",
              "sklearn", "sklearn.metrics", "sklearn.model_selection",
              "pystac_client", "dask", "dask.delayed",
              "folium", "reportlab", "reportlab.lib", "reportlab.lib.colors",
              "reportlab.lib.pagesizes", "reportlab.lib.styles",
              "reportlab.lib.units", "reportlab.platypus",
              "skimage", "skimage.morphology",
          ]:
              sys.modules.setdefault(mod, MagicMock())

          sys.path.insert(0, ".")
          sys.path.insert(0, "src")

          # Core package exports
          import src
          from src import SentinelClient, CloudFilter, VegetationIndex
          from src import ChangeDetector, ChangeResult, RiskLevel

          # New modules added this session
          import src.train_utils
          import src.logging_config
          import src.benchmark
          import src.tessera_embed_infer
          import src.tessera_embed_train
          import src.tessera_train
          import src.pipeline_runner
          import src.inference
          import src.detect_deforestation
          import src.audit_trail
          import src.dds_exporter
          import src.find_farms
          import src.enrich_farm_countries
          import src.tessera_embedding_generation
          import src.geotessera_mask_tiler

          print("All src modules import OK")
          EOF

  lint:
    name: Ruff lint (new files only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint src/ (blocking)
        run: |
          ruff check src/ main_audit.py \
            --output-format=github

      - name: Lint GEE_dynamic/ and NDVI_pred/ (informational)
        run: |
          ruff check GEE_dynamic/ NDVI_pred/ \
            --output-format=github \
            --exit-zero

  type-check:
    name: Mypy type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy + stubs
        run: pip install mypy numpy pandas

      - name: Run mypy on src/
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude 'src/__init__\.py' \
            --output=github

  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest numpy pillow
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu -q

      - name: Run tests
        run: pytest tests/ -q --tb=short

  notebook-lint:
    name: Notebook static validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nbformat
        run: pip install nbformat

      - name: Validate notebooks
        run: python scripts/validate_notebooks.py notebooks/
