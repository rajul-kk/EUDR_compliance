name: CI

on:
  push:
    branches: [main, Tessera-head]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax & import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pure-Python dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas requests python-dotenv shapely jinja2 matplotlib

      - name: Compile all Python source files
        run: python -m compileall -q src/ GEE_dynamic/ NDVI_pred/ main_audit.py

      - name: Verify src package is importable
        # MagicMock handles any attribute access (e.g. `from dask import delayed`)
        # without needing GDAL, CUDA, or Earth Engine installed.
        run: |
          python - <<'EOF'
          import sys
          from unittest.mock import MagicMock

          for mod in [
              "torch", "torch.nn", "torch.optim", "torch.utils", "torch.utils.data",
              "torchvision", "torchvision.models", "torchvision.models.segmentation",
              "rasterio", "rasterio.warp", "rasterio.features",
              "cv2", "ee", "s2cloudless", "geotessera",
              "geopandas", "osmnx", "lightgbm",
              "sklearn", "sklearn.metrics", "sklearn.model_selection",
              "pystac_client", "dask", "dask.delayed",
              "folium", "reportlab", "reportlab.lib", "reportlab.lib.colors",
              "reportlab.lib.pagesizes", "reportlab.lib.styles",
              "reportlab.lib.units", "reportlab.platypus",
              "skimage", "skimage.morphology",
          ]:
              sys.modules.setdefault(mod, MagicMock())

          sys.path.insert(0, ".")
          import src
          from src import SentinelClient, CloudFilter, VegetationIndex
          from src import ChangeDetector, ChangeResult, RiskLevel
          print("src package imports OK")
          EOF

  lint:
    name: Ruff lint (new files only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint new files
        # Only enforce on files added in this project session.
        # Pre-existing code is reported but does not fail CI.
        run: |
          ruff check \
            src/cloud_filter.py \
            src/vegetation_index.py \
            src/change_detector.py \
            src/audit_trail.py \
            src/dds_exporter.py \
            main_audit.py \
            --output-format=github

      - name: Report issues in rest of codebase (informational)
        run: |
          ruff check src/ GEE_dynamic/ NDVI_pred/ \
            --output-format=github \
            --exit-zero
